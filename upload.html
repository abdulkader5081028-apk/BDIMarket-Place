<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Product | BDIMarket-Place</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="main-header">

<div class="logo">
<a href="index.html">BDI<span>Market</span></a>
</div>

<nav class="nav-actions">
<a href="index.html" class="nav-btn">Home</a>
<a href="seller.html" class="nav-btn">Dashboard</a>
</nav>

</div>

<div style="max-width:700px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1);">

<h2>Upload New Product</h2>

<br>

<label>Product Name</label><br>
<input type="text" placeholder="Product Name" style="width:100%;padding:12px;"><br><br>

<label>Price</label><br>
<input type="number" placeholder="Price" style="width:100%;padding:12px;"><br><br>

<label>Category</label><br>

<select style="width:100%;padding:12px;">
<option>Electronics</option>
<option>Garments</option>
<option>Industrial Machinery</option>
<option>Agriculture</option>
<option>Beauty</option>
</select>

<br><br>

<label>MOQ</label><br>

<input type="number" placeholder="Minimum Order Quantity" style="width:100%;padding:12px;">

<br><br>

<label>Description</label><br>

<textarea style="width:100%;height:120px;padding:12px;"></textarea>

<br><br>

<button class="btn-primary" style="padding:15px 35px;border:none;border-radius:6px;">
Upload Product
</button>

</div>

</body>
</html>
