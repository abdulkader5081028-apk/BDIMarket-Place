<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - BDIMarket Place</title>
    <style>
        body {
            background-color: #f4f4f7;
            color: #333;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .cart-container {
            max-width: 1200px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .cart-main {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .cart-header {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .checkout-form {
            display: grid;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }
        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #ff6a00;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .cart-summary {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            height: fit-content;
        }
        .summary-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 10px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
            font-size: 18px;
            font-weight: bold;
            color: #ff6a00;
        }
        .btn-checkout {
            display: block;
            width: 100%;
            background-color: #ff6a00;
            color: #fff;
            text-align: center;
            padding: 12px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .back-home {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #ff6a00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="cart-container">
        <main class="cart-main">
            <a href="cart.html" class="back-home">← Back to Cart</a>
            <h2 class="cart-header">Checkout Information</h2>
            
            <form class="checkout-form">
                <h3>📦 Shipping Address</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Your full name" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+88017xxxxxxxx" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Full Address</label>
                    <input type="text" placeholder="House, Road, Area..." required>
                </div>

                <br><hr><br>

                <h3>💳 Payment Method</h3>
                <div class="form-group">
                    <label>Select Payment Option</label>
                    <select required>
                        <option value="cod">Cash on Delivery (COD)</option>
                        <option value="bkash">bKash / Nagad</option>
                    </select>
                </div>
            </form>
        </main>

        <aside class="cart-summary">
            <div class="summary-title">Final Review</div>
            <div class="summary-row"><span>Items Total</span> <span>$4,200.00</span></div>
            <div class="summary-row"><span>Shipping</span> <span>$70.00</span></div>
            <div class="summary-total"><span>Grand Total:</span> <span>$4,270.00</span></div>
            
            <button type="button" class="btn-checkout" onclick="alert('Order Placed Successfully! 🎉')">Place Order</button>
        </aside>
    </div>

</body>
</html>
