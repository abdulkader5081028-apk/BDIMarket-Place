<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDIMarket-Place | Sign Up</title>
<link rel="stylesheet" href="css/css/auth.css">
</head>

<body>

<h1>BDIMarket-Place</h1>

<h2>Create Account</h2>

<form>

<label>Full Name</label><br>
<input type="text" placeholder="Enter your full name"><br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email"><br><br>

<label>Password</label><br>
<input type="password" placeholder="Create password"><br><br>

<label>Confirm Password</label><br>
<input type="password" placeholder="Confirm password"><br><br>

<button type="submit">Create Account</button>

</form>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</body>
</html>
