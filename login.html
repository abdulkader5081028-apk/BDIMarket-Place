<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDIMarket Place - Login</title>
    <!-- সঠিক সিএসএস পাথ লিংক করা হলো -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- লোগো যা হোমপেজে নিয়ে যাবে -->
    <a href="index.html" class="brand-logo">BDI<span>Market</span></a>

    <!-- লগইন কার্ড কন্টেইনার -->
    <div class="auth-container">
        <h2>Sign In</h2>
        
        <form>
            <!-- ইমেইল ফিল্ড -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <!-- পাসওয়ার্ড ফিল্ড -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <!-- সাবমিট বাটন -->
            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <!-- নিচের লিংক এরিয়া -->
        <div class="auth-footer">
            <p>New to BDIMarket Place? <a href="signup.html">Join Free</a></p>
        </div>
    </div>

</body>
</html>
