<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDIMarket Place - Login</title>
    <link class="stylesheet" href="css/auth.css">
</head>
<body>

    <a href="index.html" class="brand-logo">BDI<span>Market</span></a>

    <div class="auth-container">
        <h2>Sign In</h2>
        
        <!-- এখানে id="login-form" যোগ করা হয়েছে -->
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>New to BDIMarket Place? <a href="signup.html">Join Free</a></p>
        </div>
    </div>

    <!-- জাভাস্ক্রিপ্ট ফাইল লিঙ্ক করা হলো (টাইপ মডিউল সহ) -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
