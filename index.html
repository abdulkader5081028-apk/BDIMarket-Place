<!DOCTYPE html>
<html>
<head>
<title>BDIMarket Place</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.header{
    background:#ff6600;
    color:white;
    padding:20px;
    text-align:center;
}

.search{
    width:80%;
    padding:12px;
    border-radius:20px;
    border:none;
}

.categories{
    background:white;
    padding:15px;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#eee;
}

.products{
    display:flex;
    flex-wrap:wrap;
    padding:10px;
}

.card{
    background:white;
    width:45%;
    margin:5px;
    padding:10px;
    border-radius:10px;
}

.card img{
    width:100%;
}

.price{
    color:green;
    font-weight:bold;
}

.footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<div class="header">
<h1>BDIMarket Place</h1>
<p>Global B2B Marketplace</p>

<input class="search" placeholder="Search products...">
</div>


<div class="categories">

<h2>Categories</h2>

<button>Electronics</button>
<button>Garments</button>
<button>Machinery</button>
<button>Agriculture</button>
<button>Beauty</button>

</div>


<h2 style="padding:10px;">
Featured Products
</h2>


<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smart Phone</h3>
<p class="price">$120</p>
<p>Supplier: China</p>
</div>


<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Garments</h3>
<p class="price">$5</p>
<p>Supplier: Bangladesh</p>
</div>


<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Machine</h3>
<p class="price">$500</p>
<p>Supplier: India</p>
</div>

</div>


<div class="footer">
<p>BDIMarket Place © 2026</p>
<p>About | Contact | Help</p>
</div>


</body>
</html>
